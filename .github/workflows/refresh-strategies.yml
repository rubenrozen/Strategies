name: Refresh Strategies Data

on:
  # Every day at 11:30 UTC = 6:30 AM Panama (UTC-5)
  schedule:
    - cron: '30 11 * * *'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch strategies data from Google Sheets
        run: python fetch_data.py
        env:
          VALUEUNDERFLOW_SHEET_ID:  ${{ secrets.VALUEUNDERFLOW_SHEET_ID }}
          TRENDSPOTTING_SHEET_ID:   ${{ secrets.TRENDSPOTTING_SHEET_ID }}
          NEXTHORIZON_SHEET_ID:     ${{ secrets.NEXTHORIZON_SHEET_ID }}
          CORRELATION_SHEET_ID:     ${{ secrets.CORRELATION_SHEET_ID }}

      - name: Commit updated data (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/strategies_data.json
          if git diff --staged --quiet; then
            echo "No changes to data — skipping commit."
          else
            git commit -m "chore: refresh strategies data [skip ci]"
            git push
            echo "Data updated and pushed."
          fi
